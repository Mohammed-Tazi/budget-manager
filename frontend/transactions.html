<div class="card">
    <h3>➕ Ajouter une opération</h3>
    <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px;">
        <input id="text" type="text" placeholder="Libellé (ex: Salaire, Courses...)">
        <input id="amount" type="number" placeholder="Montant (MAD)">
        <input id="category" type="text" placeholder="Catégorie">
        
        <select id="type">
            <option value="expense">🔴 Dépense</option>
            <option value="income">🟢 Revenu</option>
        </select>

        <button id="addBtn">Ajouter</button>
    </div>
</div>

<div class="card">
    <h3>📜 Historique complet</h3>
    <div id="txList">
        <p style="opacity:0.5; padding:15px;">Chargement des données...</p>
    </div>
</div>
