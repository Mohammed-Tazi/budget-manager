<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Pro - Gestion des Transactions</title>
    <link rel="stylesheet" href="app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<button class="mobile-nav-toggle" onclick="document.body.classList.toggle('nav-open')">☰</button>

<div class="sidebar">
    <div class="logo">
        <h1>💎 BUDGET PRO</h1>
    </div>
    <nav>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="transactions.html" class="active">💸 Transactions</a>
        <a href="budgets.html">🛡️ Budgets</a>
        <a href="analytics.html">📈 Analytics</a>
        <a href="goals.html">🎯 Goals</a>
    </nav>
    <div class="sidebar-footer">v2.4.0 Premium</div>
</div>

<div class="main">
    <header class="main-header">
        <div>
            <h2>Gestion de Transactions</h2>
            <p style="opacity: 0.7;">Enregistrez vos revenus et vos dépenses quotidiennes.</p>
        </div>
    </header>

    <div class="card">
        <h3>➕ Ajouter une opération</h3>
        <div class="transaction-form" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px;">
            <input id="text" type="text" placeholder="Libellé (ex: Salaire, Courses...)" style="flex: 2; min-width: 200px;" class="form-input">
            <input id="amount" type="number" placeholder="Montant (MAD)" style="flex: 1; min-width: 120px;" class="form-input">
            <input id="category" type="text" placeholder="Catégorie (ex: Loisirs, Loyer...)" style="flex: 1; min-width: 150px;" class="form-input">
            
            <select id="type" style="flex: 1; min-width: 120px; padding: 10px;" class="form-input">
                <option value="expense">🔴 Dépense</option>
                <option value="income">🟢 Revenu</option>
            </select>

            <button onclick="window.handleAdd()" style="flex: 1; cursor: pointer; min-width: 100px;" class="btn-primary">
                Ajouter
            </button>
        </div>
    </div>

    <div class="card" style="margin-top: 25px;">
        <h3>📜 Historique complet</h3>
        <div class="table-container">
            <div id="txList">
                <p style="opacity:0.5; padding:15px;">Chargement des transactions...</p>
            </div>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
