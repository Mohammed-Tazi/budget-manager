<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Budget Pro - Dashboard</title>
    <link rel="stylesheet" href="app.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="sidebar">
        <h1>Budget Pro</h1>
        <nav>
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="transactions.html">Transactions</a>
            <a href="budgets.html">Budgets</a>
            <a href="analytics.html">Analytics</a>
            <a href="goals.html">Goals</a>
        </nav>
    </div>
    <div class="main">
        <div class="card">
            <h3>Ajouter une opération</h3>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <input type="text" id="text" placeholder="Ex: Courses">
                <input type="number" id="amount" placeholder="Montant">
                <select id="category">
                    <option value="Alimentation">Alimentation</option>
                    <option value="Salaire">Salaire</option>
                    <option value="Loisirs">Loisirs</option>
                </select>
                <button onclick="handleAdd()">Ajouter</button>
            </div>
        </div>
        <div class="grid">
            <div class="card"><span>Solde Total</span><div class="big" id="kpiTotal">0 MAD</div></div>
            <div class="card"><span>Revenus</span><div class="big" id="kpiIncome" style="color:#1cc88a">0</div></div>
            <div class="card"><span>Dépenses</span><div class="big" id="kpiExpense" style="color:#e74a3b">0</div></div>
            <div class="card"><span>Score Santé</span><div class="big" id="financeScore">0/100</div></div>
        </div>
        <div class="card">
            <h3>Flux Financier</h3>
            <div style="height: 250px;"><canvas id="flowChart"></canvas></div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
