<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Pro - Objectifs</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
<div class="sidebar">
    <h1>Budget Pro</h1>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="transactions.html">Transactions</a>
        <a href="budgets.html">Budgets</a>
        <a href="analytics.html">Analytics</a>
        <a href="goals.html">Goals</a>
    </nav>
</div>

<div class="main">
    <header style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <h2>Mes Objectifs Financiers</h2>
            <p style="opacity: 0.7;">Suivez votre progression en temps réel.</p>
        </div>
        <button onclick="window.handleReset()" style="background: #e74a3b; padding: 8px 15px; font-size: 12px; border: none; border-radius: 5px; color: white; cursor: pointer;">
            Réinitialiser l'historique
        </button>
    </header>

    <div class="card">
        <h3>🎯 Nouvel objectif</h3>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px;">
            <input id="goalName" type="text" placeholder="Ex: Voyage au Japon" style="flex: 2; min-width: 200px;">
            <input id="goalTarget" type="number" placeholder="Montant cible (MAD)" style="flex: 1; min-width: 150px;">
            <input id="goalSaved" type="number" placeholder="Déjà épargné (MAD)" style="flex: 1; min-width: 150px;">
            <button onclick="window.handleSaveGoal()" style="flex: 1;">Enregistrer</button>
        </div>
    </div>

    <div class="grid" id="goalList" style="margin-top: 25px;"></div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
