<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Pro - Analyses</title>
    <link rel="stylesheet" href="app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <button class="mobile-nav-toggle" onclick="document.body.classList.toggle('nav-open')">☰</button>

    <div class="sidebar">
        <div class="logo">
            <h1>💎 Budget Pro</h1>
        </div>
        <nav>
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="transactions.html">💸 Transactions</a>
            <a href="budgets.html">🛡️ Budgets</a>
            <a href="analytics.html" class="active">📈 Analytics</a>
            <a href="goals.html">🎯 Goals</a>
        </nav>
        <div class="sidebar-footer">v2.4.0 Premium</div>
    </div>

    <div class="main">
        <header class="main-header">
            <div>
                <h2>Analyses Avancées</h2>
                <p style="opacity: 0.7;">Visualisez la répartition de vos finances et vos habitudes.</p>
            </div>
        </header>

        <div class="grid chart-grid">
            <div class="card">
                <h3>Structure Budgétaire</h3>
                <div class="chart-wrapper">
                    <canvas id="pie"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>Dépenses par Catégorie</h3>
                <div class="chart-wrapper">
                    <canvas id="bar"></canvas>
                </div>
            </div>
        </div>
        
        <div class="card info-footer">
            <p>✨ Les graphiques se mettent à jour automatiquement à chaque nouvelle transaction.</p>
        </div>
    </div>

    <script type="module" src="charts.js"></script>
</body>
</html>
